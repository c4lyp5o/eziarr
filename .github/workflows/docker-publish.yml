name: Build & Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
    - name: 🧾 Checkout source
      uses: actions/checkout@v4

    - name: 📦 Get package version
      id: package-version
      run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

    - name: 🐳 Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🐳 Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🛠️ Build & Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          calypso666/eziarr:${{ steps.package-version.outputs.version }}
          calypso666/eziarr:latest

    - name: 🔔 Notify ntfy
      if: always()
      run: |
        curl \
          -H "Title: Build ${{ job.status }}: eziarr:${{ steps.package-version.outputs.version }}" \
          -H "Priority: ${{ job.status == 'success' && 'default' || 'high' }}" \
          -H "Tags: ${{ job.status == 'success' && 'white_check_mark' || 'x' }},rocket" \
          -d "Branch: ${{ github.ref_name }} | Status: ${{ job.status }}" \
          ${{ secrets.NTFY_URL }}